<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">iAgent dock running on Windows</title>
  <desc id="desc">A stylized Windows desktop screenshot showing the iAgent robot dock, tray status, and a running task panel.</desc>
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f"/>
      <stop offset="0.55" stop-color="#123047"/>
      <stop offset="1" stop-color="#0b1b2a"/>
    </linearGradient>
    <linearGradient id="dock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#dbe8f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000814" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 600 18px "Segoe UI", sans-serif; fill: #143047; }
      .small { font: 500 14px "Segoe UI", sans-serif; fill: #5f7282; }
      .task { font: 600 16px "Segoe UI", sans-serif; fill: #20384d; }
      .mono { font: 600 13px "Cascadia Mono", monospace; fill: #6ed6a5; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#wallpaper)"/>
  <circle cx="1040" cy="110" r="220" fill="#2a6f92" opacity="0.22"/>
  <circle cx="230" cy="560" r="260" fill="#43b5a0" opacity="0.14"/>
  <path d="M0 620 C180 560 300 690 480 630 C650 572 760 620 910 590 C1060 558 1150 602 1280 545 L1280 720 L0 720 Z" fill="#06101a" opacity="0.45"/>

  <g filter="url(#shadow)">
    <rect x="96" y="94" width="680" height="430" rx="30" fill="#0d1c29" opacity="0.92"/>
    <rect x="124" y="126" width="624" height="72" rx="20" fill="#152b3d"/>
    <text x="154" y="158" class="mono">iAgent dock</text>
    <text x="154" y="181" class="small" fill="#9fb3c2">Listening from the desktop tray</text>
    <circle cx="694" cy="162" r="11" fill="#6ed6a5"/>
    <text x="154" y="248" class="task" fill="#dcebf7">"Open Notepad and draft a short meeting follow-up."</text>
    <rect x="154" y="282" width="524" height="56" rx="18" fill="#12283a"/>
    <text x="182" y="315" class="small" fill="#b8c7d4">Queued local desktop task</text>
    <rect x="154" y="360" width="430" height="56" rx="18" fill="#12283a"/>
    <text x="182" y="393" class="small" fill="#b8c7d4">Running backend workflow</text>
    <rect x="154" y="438" width="500" height="38" rx="19" fill="#1e4058"/>
    <rect x="154" y="438" width="330" height="38" rx="19" fill="#6ed6a5"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="842" y="126" width="270" height="430" rx="42" fill="url(#dock)"/>
    <circle cx="977" cy="246" r="72" fill="#172b3d"/>
    <circle cx="952" cy="238" r="12" fill="#6ed6a5"/>
    <circle cx="1002" cy="238" r="12" fill="#6ed6a5"/>
    <rect x="930" y="274" width="94" height="12" rx="6" fill="#dfeaf2"/>
    <rect x="914" y="176" width="126" height="44" rx="22" fill="#e85d75"/>
    <rect x="945" y="154" width="64" height="34" rx="17" fill="#f8fbff"/>
    <text x="906" y="368" class="label">iAgent is ready</text>
    <text x="906" y="398" class="small">Type, speak, or use Alt+;</text>
    <rect x="906" y="432" width="142" height="44" rx="22" fill="#143047"/>
    <text x="936" y="460" class="small" fill="#ffffff">Ask iAgent</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="610" width="340" height="58" rx="20" fill="#edf4fa"/>
    <circle cx="858" cy="639" r="14" fill="#e85d75"/>
    <circle cx="900" cy="639" r="14" fill="#143047"/>
    <circle cx="942" cy="639" r="14" fill="#6ed6a5"/>
    <text x="984" y="645" class="small">Tray: iAgent running</text>
  </g>
</svg>
