<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024" role="img" aria-labelledby="title desc">
  <title id="title">iAgent Windows Ambient Agent Architecture</title>
  <desc id="desc">Dark neon architecture diagram for iAgent Windows ambient agent, showing install, Python shell, companion flow, Rust runtime, tools, providers, ambient desktop mode, and storage.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0" stop-color="#142033"/><stop offset="0.48" stop-color="#07111f"/><stop offset="1" stop-color="#02040a"/></radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#86efac"/><stop offset="1" stop-color="#15803d"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d8b4fe"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#ea580c"/></linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="135%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".5"/></filter>
    <filter id="halo"><feGaussianBlur stdDeviation="26"/></filter>
    <marker id="a" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#67e8f9"/></marker>
    <marker id="ag" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#86efac"/></marker>
    <style>
      .title{font:900 64px Inter,'Segoe UI',Arial,sans-serif;fill:#f8fafc;letter-spacing:-2px}.subtitle{font:600 20px Inter,'Segoe UI',Arial,sans-serif;fill:#67e8f9}.panel{fill:#061522;stroke:#1682b8;stroke-width:2;filter:url(#shadow)}.pgreen{fill:#061b14;stroke:#17c964}.ppurple{fill:#120a26;stroke:#9f7aea}.porange{fill:#1f1305;stroke:#f59e0b}.pstore{fill:#071626;stroke:#60a5fa}.h{font:800 22px Inter,'Segoe UI',Arial,sans-serif;fill:#f8fafc}.m{font:600 13px Inter,'Segoe UI',Arial,sans-serif;fill:#a6c7df}.t{font:600 14px Inter,'Segoe UI',Arial,sans-serif;fill:#e2e8f0}.xs{font:600 11px Inter,'Segoe UI',Arial,sans-serif;fill:#a7b7c9}.num{font:900 24px Inter,'Segoe UI',Arial,sans-serif;fill:#03111a}.pill{fill:#0b2135;stroke:#2a5a7d;stroke-width:1.2}.gpill{fill:#0a2418;stroke:#2dd887;stroke-width:1.2}.vpill{fill:#1b1236;stroke:#a78bfa;stroke-width:1.2}.opill{fill:#241709;stroke:#f59e0b;stroke-width:1.2}.line{fill:none;stroke:#67e8f9;stroke-width:3;stroke-linecap:round;marker-end:url(#a)}.dash{fill:none;stroke:#86efac;stroke-width:2.5;stroke-dasharray:8 8;stroke-linecap:round;marker-end:url(#ag)}.legend{font:600 12px Inter,'Segoe UI',Arial,sans-serif;fill:#dbeafe}.foot{font:700 13px Inter,'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1792" height="1024" fill="url(#bg)"/>
  <circle cx="210" cy="130" r="250" fill="#0ea5e9" opacity=".16" filter="url(#halo)"/><circle cx="1500" cy="850" r="330" fill="#16a34a" opacity=".14" filter="url(#halo)"/><circle cx="950" cy="355" r="240" fill="#7c3aed" opacity=".10" filter="url(#halo)"/>
  <text x="535" y="72" class="title">iAgent Windows</text>
  <text x="488" y="105" class="subtitle">Ambient agent architecture — verified from README and source files</text>

  <rect x="18" y="30" width="322" height="500" rx="18" class="panel"/>
  <circle cx="53" cy="65" r="20" fill="url(#cyan)" filter="url(#glow)"/><text x="45" y="74" class="num">1</text><text x="88" y="73" class="h">Install &amp; Launch</text>
  <g class="t"><rect x="42" y="105" width="274" height="29" rx="7" class="pill"/><text x="58" y="125">scripts/install.ps1</text><rect x="42" y="143" width="274" height="29" rx="7" class="pill"/><text x="58" y="163">release download + SHA256 checks</text><rect x="42" y="181" width="274" height="29" rx="7" class="pill"/><text x="58" y="201">installs iagent.exe</text><rect x="42" y="219" width="274" height="29" rx="7" class="pill"/><text x="58" y="239">sets up desktop dock app</text><rect x="42" y="257" width="274" height="29" rx="7" class="pill"/><text x="58" y="277">installs uv runtime</text><rect x="42" y="295" width="274" height="29" rx="7" class="pill"/><text x="58" y="315">optional worker deps (npm)</text><rect x="42" y="333" width="274" height="29" rx="7" class="pill"/><text x="58" y="353">Alt+; global hotkey setup</text><rect x="42" y="371" width="274" height="29" rx="7" class="pill"/><text x="58" y="391">desktop shortcut</text><rect x="42" y="409" width="274" height="29" rx="7" class="pill"/><text x="58" y="429">personal ambient daemon launcher</text><rect x="42" y="447" width="274" height="42" rx="7" class="pill"/><text x="58" y="466">app/launch-iagent.ps1 starts dock</text><text x="58" y="482">worker starts only with worker_url</text></g>

  <rect x="372" y="132" width="350" height="470" rx="18" class="panel pgreen"/>
  <circle cx="407" cy="167" r="20" fill="url(#green)" filter="url(#glow)"/><text x="399" y="176" class="num">2</text><text x="445" y="175" class="h">Python Desktop Shell</text><text x="445" y="199" class="m">PySide6 + qasync • app/iagent-py</text>
  <rect x="400" y="230" width="140" height="318" rx="10" class="gpill"/><rect x="555" y="230" width="140" height="318" rx="10" class="gpill"/>
  <g class="t"><text x="416" y="260">▸ tray icon</text><text x="416" y="292">▸ history window</text><text x="416" y="324">▸ task inbox</text><text x="416" y="356">▸ prompt dock</text><text x="416" y="388">▸ proposal popups</text><text x="416" y="420">▸ hotkey monitor</text><text x="416" y="452">▸ mic capture</text><text x="416" y="484">▸ screen capture</text><text x="572" y="260">▸ execution memory</text><text x="572" y="292">▸ voice start/stop</text><text x="572" y="324">▸ start/stop ambient</text><text x="572" y="356">▸ queues agent goals</text><text x="572" y="388">▸ background shell cmds</text><text x="572" y="430">Office artifact builders:</text><text x="572" y="456">PowerPoint • Word • Excel</text></g>

  <rect x="760" y="160" width="305" height="430" rx="18" class="panel ppurple"/>
  <circle cx="795" cy="195" r="20" fill="url(#purple)" filter="url(#glow)"/><text x="787" y="204" class="num">3</text><text x="835" y="203" class="h">Companion / Interaction Flow</text>
  <rect x="797" y="245" width="230" height="48" rx="24" class="vpill"/><text x="858" y="275" class="t">Mic / User Prompts</text>
  <path class="line" d="M912 293 L912 330"/>
  <rect x="812" y="330" width="205" height="80" rx="18" fill="#26124c" stroke="#c084fc" stroke-width="2.4" filter="url(#glow)"/><text x="848" y="365" class="h">CompanionManager</text><text x="878" y="392" class="m">+ task flow</text>
  <g class="xs"><rect x="790" y="448" width="125" height="31" rx="7" class="vpill"/><text x="805" y="468">interim transcript</text><rect x="930" y="448" width="120" height="31" rx="7" class="vpill"/><text x="944" y="468">iagent_goal_requested</text><rect x="790" y="489" width="125" height="31" rx="7" class="vpill"/><text x="805" y="509">final transcript</text><rect x="930" y="489" width="120" height="31" rx="7" class="vpill"/><text x="944" y="509">proposal_requested</text><rect x="790" y="530" width="125" height="31" rx="7" class="vpill"/><text x="805" y="550">response complete</text><rect x="930" y="530" width="120" height="31" rx="7" class="vpill"/><text x="944" y="550">typing_action_blocked</text></g>

  <rect x="1092" y="132" width="322" height="610" rx="18" class="panel pgreen"/>
  <circle cx="1127" cy="167" r="20" fill="url(#green)" filter="url(#glow)"/><text x="1119" y="176" class="num">4</text><text x="1168" y="175" class="h">Rust Backend Runtime</text>
  <rect x="1122" y="220" width="262" height="190" rx="10" class="gpill"/><text x="1142" y="252" class="h">A. CLI + Server</text><g class="t"><text x="1142" y="288">serve • run • login</text><text x="1142" y="320">auth / provider / model commands</text><text x="1142" y="352">memory / session commands</text><text x="1142" y="384">ambient • daemon • browser setup</text></g>
  <rect x="1122" y="430" width="262" height="170" rx="10" class="gpill"/><text x="1142" y="462" class="h">B. Agent Session Core</text><g class="t"><text x="1142" y="498">provider-backed agent</text><text x="1142" y="528">session state + skill registry</text><text x="1142" y="558">soft interrupts + shutdown</text><text x="1142" y="588">cache + usage tracking</text></g>
  <rect x="1122" y="620" width="262" height="90" rx="10" class="gpill"/><text x="1142" y="652" class="h">C. Safety + Orchestration</text><text x="1142" y="684" class="t">approval • compaction • subagents</text>

  <rect x="1450" y="30" width="322" height="430" rx="18" class="panel porange"/>
  <circle cx="1485" cy="65" r="20" fill="url(#orange)" filter="url(#glow)"/><text x="1477" y="74" class="num">5</text><text x="1520" y="73" class="h">Tool Registry</text><text x="1520" y="97" class="m">src/tool/mod.rs</text>
  <g class="t"><rect x="1477" y="125" width="268" height="34" rx="7" class="opill"/><text x="1492" y="146">file/code: read, write, edit, patch</text><rect x="1477" y="166" width="268" height="34" rx="7" class="opill"/><text x="1492" y="187">grep, glob, ls, file, codesearch</text><rect x="1477" y="207" width="268" height="34" rx="7" class="opill"/><text x="1492" y="228">shell: bash, bg, batch</text><rect x="1477" y="248" width="268" height="34" rx="7" class="opill"/><text x="1492" y="269">desktop/browser: computer, browser</text><rect x="1477" y="289" width="268" height="34" rx="7" class="opill"/><text x="1492" y="310">gmail, meeting, word, app, open</text><rect x="1477" y="330" width="268" height="34" rx="7" class="opill"/><text x="1492" y="351">memory, conversation/session search</text><rect x="1477" y="371" width="268" height="34" rx="7" class="opill"/><text x="1492" y="392">subagent, batch, swarm, dispatch</text><rect x="1477" y="412" width="268" height="34" rx="7" class="opill"/><text x="1492" y="433">skills, MCP, selfdev, scheduling</text></g>

  <rect x="1430" y="505" width="342" height="280" rx="18" class="panel"/>
  <circle cx="1465" cy="540" r="20" fill="url(#cyan)" filter="url(#glow)"/><text x="1457" y="549" class="num">6</text><text x="1500" y="548" class="h">Providers &amp; Integrations</text>
  <g class="t"><text x="1460" y="596">Provider layer: OpenAI, OpenRouter, Gemini</text><text x="1460" y="628">Copilot, Cursor, Claude / Anthropic</text><text x="1460" y="660">Antigravity, iAgent provider path</text><text x="1460" y="692">Bedrock behind feature flag</text><text x="1460" y="738">External: browser CDP • OfficeCLI</text><text x="1460" y="766">Windows apps • shell / filesystem</text></g>

  <rect x="18" y="660" width="735" height="255" rx="18" class="panel pgreen"/>
  <circle cx="53" cy="695" r="20" fill="url(#green)" filter="url(#glow)"/><text x="45" y="704" class="num">7</text><text x="88" y="703" class="h">Ambient Desktop Mode</text><text x="88" y="727" class="m">proactively monitor → suggest → notify → schedule → trigger cycles</text>
  <g class="t"><rect x="45" y="765" width="128" height="42" rx="8" class="gpill"/><text x="61" y="790">desktop_monitor</text><rect x="184" y="765" width="128" height="42" rx="8" class="gpill"/><text x="200" y="790">suggestion_engine</text><rect x="323" y="765" width="128" height="42" rx="8" class="gpill"/><text x="339" y="790">notification detector</text><rect x="462" y="765" width="128" height="42" rx="8" class="gpill"/><text x="478" y="790">importance scorer</text><rect x="45" y="820" width="150" height="42" rx="8" class="gpill"/><text x="61" y="845">reminders / sessions</text><rect x="205" y="820" width="115" height="42" rx="8" class="gpill"/><text x="221" y="845">directives</text><rect x="330" y="820" width="260" height="42" rx="8" class="gpill"/><text x="346" y="845">inject messages into active ambient cycle</text><text x="52" y="890">Proactive loop: monitor → score → suggest → notify → schedule → run</text></g>
  <g class="xs"><circle cx="625" cy="770" r="7" fill="#cbd5e1"/><text x="642" y="775">idle</text><circle cx="625" cy="797" r="7" fill="#86efac"/><text x="642" y="802">running</text><circle cx="625" cy="824" r="7" fill="#60a5fa"/><text x="642" y="829">scheduled</text><circle cx="625" cy="851" r="7" fill="#facc15"/><text x="642" y="856">paused</text><circle cx="625" cy="878" r="7" fill="#f87171"/><text x="642" y="883">disabled</text></g>

  <rect x="795" y="820" width="640" height="155" rx="18" class="panel pstore"/>
  <text x="835" y="856" class="h">Storage, Memory &amp; Config</text>
  <g class="t"><rect x="825" y="880" width="94" height="60" rx="8" class="pill"/><text x="838" y="906">%APPDATA%</text><text x="838" y="924">config.toml</text><rect x="930" y="880" width="94" height="60" rx="8" class="pill"/><text x="943" y="906">~/.iagent</text><text x="943" y="924">config.toml</text><rect x="1035" y="880" width="94" height="60" rx="8" class="pill"/><text x="1058" y="914">logs</text><rect x="1140" y="880" width="94" height="60" rx="8" class="pill"/><text x="1155" y="914">sessions</text><rect x="1245" y="880" width="94" height="60" rx="8" class="pill"/><text x="1260" y="906">memory</text><text x="1260" y="924">JSON graph</text><rect x="1350" y="880" width="70" height="60" rx="8" class="pill"/><text x="1361" y="906">audit</text><text x="1361" y="924">jsonl</text><text x="835" y="960">ambient queue/state • visible_cycle.json • cycle_result.json • execution_memory.json</text></g>

  <rect x="1445" y="810" width="327" height="165" rx="18" fill="#0a1019" stroke="#475569" stroke-width="1.5"/>
  <text x="1570" y="837" class="h">Data Flow Legend</text><g class="legend"><path class="line" d="M1470 862 L1510 862"/><text x="1525" y="866">User / desktop input → Python shell</text><path class="line" d="M1470 890 L1510 890"/><text x="1525" y="894">Shell ↔ Companion ↔ Rust runtime</text><path class="line" d="M1470 918 L1510 918"/><text x="1525" y="922">Runtime ↔ Tools / Providers</text><path class="dash" d="M1470 946 L1510 946"/><text x="1525" y="950">Ambient mode ↔ runtime + storage</text></g>

  <path class="line" d="M340 285 C360 285 360 300 372 300"/><path class="line" d="M722 365 C740 365 740 365 760 365"/><path class="line" d="M1065 365 C1080 365 1080 365 1092 365"/><path class="line" d="M1414 305 C1430 305 1430 305 1450 305"/><path class="line" d="M1414 610 C1420 610 1420 610 1430 610"/><path class="dash" d="M545 602 C500 642 435 665 380 700"/><path class="dash" d="M1120 742 C1080 790 1020 810 965 820"/><path class="dash" d="M665 790 C800 770 945 720 1122 660"/>
  <text x="600" y="1000" class="foot">Grounded in repository README + source files. No invented Electron/React layer.</text>
</svg>
