<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024" role="img" aria-labelledby="title desc">
  <title id="title">iAgent Windows Ambient Agent Architecture</title>
  <desc id="desc">A stylish ambient-agent architecture diagram for iAgent Windows with verified components from the README and source files.</desc>
  <defs>
    <radialGradient id="bg1" cx="50%" cy="48%" r="75%"><stop offset="0%" stop-color="#111827"/><stop offset="45%" stop-color="#07111f"/><stop offset="100%" stop-color="#020617"/></radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#bbf7d0"/><stop offset="1" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e9d5ff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity=".45"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#67e8f9"/></marker>
    <marker id="garr" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#86efac"/></marker>
    <style>
      .title{font:900 58px Inter,'Segoe UI',Arial,sans-serif;fill:#f8fafc;letter-spacing:-2px}.subtitle{font:600 20px Inter,'Segoe UI',Arial,sans-serif;fill:#67e8f9}.panel{fill:#071423;stroke:#1e8bb6;stroke-width:2.4;filter:url(#shadow)}.green{fill:#071a13;stroke:#22c55e}.purple{fill:#110c24;stroke:#8b5cf6}.orange{fill:#1f1305;stroke:#f59e0b}.store{fill:#081422;stroke:#60a5fa}.h{font:800 22px Inter,'Segoe UI',Arial,sans-serif;fill:#f8fafc}.sub{font:600 13px Inter,'Segoe UI',Arial,sans-serif;fill:#a7f3d0}.txt{font:600 14px Inter,'Segoe UI',Arial,sans-serif;fill:#dbeafe}.tiny{font:600 11px Inter,'Segoe UI',Arial,sans-serif;fill:#94a3b8}.chip{font:900 15px Inter,'Segoe UI',Arial,sans-serif;fill:#02111b}.node{fill:#0b1f32;stroke:#274b6f;stroke-width:1.2}.g{fill:none;stroke:#67e8f9;stroke-width:3;marker-end:url(#arr);stroke-linecap:round}.gd{fill:none;stroke:#86efac;stroke-width:2.4;marker-end:url(#garr);stroke-dasharray:8 8;stroke-linecap:round}.thin{fill:none;stroke:#64748b;stroke-width:1.4;stroke-dasharray:5 7}.n{font:900 25px Inter,'Segoe UI',Arial,sans-serif;fill:#03131b}.ic{font:900 24px 'Segoe UI Symbol','Segoe UI',Arial,sans-serif;fill:#bfdbfe}
    </style>
  </defs>
  <rect width="1792" height="1024" fill="url(#bg1)"/>
  <circle cx="190" cy="160" r="240" fill="#0ea5e9" opacity=".14" filter="url(#soft)"/><circle cx="1500" cy="880" r="360" fill="#22c55e" opacity=".12" filter="url(#soft)"/><circle cx="930" cy="230" r="230" fill="#8b5cf6" opacity=".10" filter="url(#soft)"/>
  <text x="545" y="70" class="title">iAgent Windows</text>
  <text x="490" y="103" class="subtitle">Ambient agent architecture — verified from README + source files</text>

  <rect x="20" y="28" width="330" height="505" rx="22" class="panel"/>
  <circle cx="55" cy="62" r="20" fill="url(#blue)"/><text x="47" y="71" class="n">1</text><text x="88" y="70" class="h">Install &amp; Launch</text>
  <g class="txt"><text x="48" y="115">▸ scripts/install.ps1</text><text x="48" y="147">▸ release download + SHA256 verification</text><text x="48" y="179">▸ installs iagent.exe</text><text x="48" y="211">▸ sets up desktop dock app</text><text x="48" y="243">▸ installs uv runtime</text><text x="48" y="275">▸ optional worker dependency install</text><text x="48" y="307">▸ optional Alacritty setup</text><text x="48" y="339">▸ Alt+; global hotkey setup</text><text x="48" y="371">▸ desktop shortcut</text><text x="48" y="403">▸ personal ambient daemon launcher</text><text x="48" y="435">▸ app/launch-iagent.ps1 starts dock</text><text x="48" y="467">▸ optional worker starts only with worker_url</text></g>

  <rect x="385" y="130" width="355" height="470" rx="22" class="panel green"/>
  <circle cx="420" cy="166" r="20" fill="url(#green)"/><text x="412" y="175" class="n">2</text><text x="452" y="174" class="h">Python Desktop Shell</text><text x="452" y="197" class="sub">PySide6 + qasync • app/iagent-py</text>
  <rect x="415" y="225" width="145" height="315" rx="12" class="node"/><rect x="575" y="225" width="135" height="315" rx="12" class="node"/>
  <g class="txt"><text x="432" y="260">▸ tray icon</text><text x="432" y="292">▸ history window</text><text x="432" y="324">▸ task inbox</text><text x="432" y="356">▸ prompt dock</text><text x="432" y="388">▸ proposal popups</text><text x="432" y="420">▸ hotkey monitor</text><text x="432" y="452">▸ mic capture</text><text x="432" y="484">▸ screen capture</text><text x="592" y="260">▸ execution memory</text><text x="592" y="292">▸ voice start/stop</text><text x="592" y="324">▸ start/stop ambient</text><text x="592" y="356">▸ queues goals</text><text x="592" y="388">▸ background shell cmds</text><text x="592" y="420">▸ Office builders</text><text x="592" y="452">PowerPoint • Word • Excel</text></g>

  <rect x="760" y="160" width="300" height="430" rx="22" class="panel purple"/>
  <circle cx="795" cy="196" r="20" fill="url(#purple)"/><text x="787" y="205" class="n">3</text><text x="825" y="204" class="h">Companion Flow</text><text x="825" y="227" class="sub">interaction + task routing</text>
  <rect x="795" y="255" width="230" height="50" rx="25" class="node"/><text x="852" y="286" class="txt">Mic / User Prompt</text>
  <rect x="810" y="335" width="200" height="82" rx="18" fill="#20113f" stroke="#c084fc" stroke-width="2"/><text x="838" y="370" class="h">CompanionManager</text><text x="873" y="397" class="sub">+ task flow</text>
  <g class="tiny"><text x="800" y="460">interim transcript • final transcript</text><text x="800" y="485">response delta • response complete</text><text x="800" y="510">background_command_requested</text><text x="800" y="535">iagent_goal_requested • proposal_requested</text><text x="800" y="560">typing_action_blocked • success_turn_completed</text></g>

  <rect x="1090" y="125" width="325" height="615" rx="22" class="panel green"/>
  <circle cx="1125" cy="161" r="20" fill="url(#green)"/><text x="1117" y="170" class="n">4</text><text x="1155" y="169" class="h">Rust Backend Runtime</text><text x="1155" y="192" class="sub">CLI + server + agent session core</text>
  <rect x="1120" y="225" width="265" height="185" rx="12" class="node"/><text x="1140" y="257" class="h">A. CLI + Server</text><g class="txt"><text x="1140" y="292">serve • run • login</text><text x="1140" y="322">auth / provider / model commands</text><text x="1140" y="352">memory / session commands</text><text x="1140" y="382">ambient • daemon • browser setup</text></g>
  <rect x="1120" y="430" width="265" height="170" rx="12" class="node"/><text x="1140" y="462" class="h">B. Agent Core</text><g class="txt"><text x="1140" y="497">provider-backed agent</text><text x="1140" y="527">session state + skill registry</text><text x="1140" y="557">soft interrupts + shutdown</text><text x="1140" y="587">cache + usage tracking</text></g>
  <rect x="1120" y="620" width="265" height="90" rx="12" class="node"/><text x="1140" y="652" class="h">C. Safety + Orchestration</text><text x="1140" y="682" class="txt">approval, compaction, subagents</text>

  <rect x="1450" y="25" width="322" height="435" rx="22" class="panel orange"/>
  <circle cx="1485" cy="61" r="20" fill="url(#orange)"/><text x="1477" y="70" class="n">5</text><text x="1515" y="69" class="h">Tool Registry</text><text x="1515" y="92" class="sub">src/tool/mod.rs</text>
  <g class="txt"><text x="1485" y="135">▸ file/code: read, write, edit, patch</text><text x="1485" y="165">▸ grep, glob, ls, file, codesearch</text><text x="1485" y="195">▸ shell: bash, bg, batch</text><text x="1485" y="225">▸ desktop/browser: computer, browser</text><text x="1485" y="255">▸ app, open, word, gmail, meeting</text><text x="1485" y="285">▸ memory, conversation_search</text><text x="1485" y="315">▸ session_search</text><text x="1485" y="345">▸ subagent, batch, swarm, dispatch</text><text x="1485" y="375">▸ connector, briefing, recipe, personal</text><text x="1485" y="405">▸ skills, MCP, selfdev, scheduling</text></g>

  <rect x="1430" y="500" width="342" height="285" rx="22" class="panel"/>
  <circle cx="1465" cy="536" r="20" fill="url(#blue)"/><text x="1457" y="545" class="n">6</text><text x="1495" y="544" class="h">Providers &amp; Integrations</text>
  <g class="txt"><text x="1462" y="590">Provider layer: OpenAI, OpenRouter, Gemini</text><text x="1462" y="620">Copilot, Cursor, Claude / Anthropic</text><text x="1462" y="650">Antigravity, iAgent provider path</text><text x="1462" y="680">Bedrock behind feature flag</text><text x="1462" y="725">External: browser CDP • OfficeCLI</text><text x="1462" y="755">Windows apps • shell/filesystem</text></g>

  <rect x="20" y="660" width="735" height="250" rx="22" class="panel green"/>
  <circle cx="55" cy="696" r="20" fill="url(#green)"/><text x="47" y="705" class="n">7</text><text x="88" y="704" class="h">Ambient Desktop Mode</text><text x="88" y="727" class="sub">proactively monitor → suggest → notify → schedule → trigger cycles</text>
  <g class="txt"><text x="55" y="775">▸ desktop_monitor • suggestion_engine • notification_detector</text><text x="55" y="807">▸ importance scorer • overlay_ui daemon • app filters</text><text x="55" y="839">▸ safety handle • reminders / scheduled sessions</text><text x="55" y="871">▸ directives • inject messages into active ambient cycle</text></g>
  <g class="tiny"><circle cx="610" cy="770" r="7" fill="#9ca3af"/><text x="627" y="775">idle</text><circle cx="610" cy="797" r="7" fill="#86efac"/><text x="627" y="802">running</text><circle cx="610" cy="824" r="7" fill="#60a5fa"/><text x="627" y="829">scheduled</text><circle cx="610" cy="851" r="7" fill="#facc15"/><text x="627" y="856">paused</text><circle cx="610" cy="878" r="7" fill="#f87171"/><text x="627" y="883">disabled</text></g>

  <rect x="795" y="815" width="640" height="160" rx="22" class="panel store"/>
  <text x="830" y="852" class="h">⑧ Storage, Memory &amp; Config</text>
  <g class="txt"><text x="845" y="900">%APPDATA%\iAgent\config.toml • ~/.iagent/config.toml • logs • sessions</text><text x="845" y="932">execution_memory.json • JSON memory graph • ambient queue/state</text><text x="845" y="964">visible_cycle.json • cycle_result.json • shell-audit.jsonl • setup_hints.json</text></g>

  <path class="g" d="M350 285 C365 285 365 300 385 300"/><path class="g" d="M740 365 C750 365 750 365 760 365"/><path class="g" d="M1060 365 C1075 365 1075 365 1090 365"/><path class="g" d="M1415 310 C1430 310 1430 310 1450 310"/><path class="g" d="M1415 610 C1422 610 1422 610 1430 610"/>
  <path class="gd" d="M545 600 C500 635 440 660 385 700"/><path class="gd" d="M1115 740 C1065 785 1010 805 970 815"/><path class="gd" d="M680 795 C810 780 960 735 1120 670"/><path class="gd" d="M1110 895 C980 855 860 825 735 785"/>
  <text x="594" y="1000" class="tiny">Grounded in repository README and source files. No invented Electron/React layer.</text>
</svg>
